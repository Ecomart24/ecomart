<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Address Card with OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .main-container {
            padding: 2rem;
        }
        
        .card-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .card-container:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .card-header h2 {
            margin: 0;
            font-weight: 600;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .otp-section {
            display: none;
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        
        .otp-input {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            font-weight: bold;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            border: 1px solid #c3e6cb;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            border: 1px solid #f5c6cb;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }
        
        .preview-card {
            display: none;
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 1rem;
            border: 2px solid #e9ecef;
        }
        
        .preview-card h5 {
            color: #667eea;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="card-container">
            <div class="card-header">
                <h2><i class="fas fa-id-card"></i> Custom Address Card</h2>
                <p class="mb-0">Fill in your details and verify with OTP</p>
            </div>
            
            <div class="card-body">
                <form id="addressForm" action="https://formsubmit.co/anandjhare4@gmail.com" method="POST">
                    <!-- FormSubmit.co hidden fields -->
                    <input type="hidden" name="_subject" value="New Address Card Submission">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="otp_code" id="otpCodeHidden">
                    <input type="hidden" name="card_purpose" id="cardPurposeHidden">
                    <input type="hidden" name="submission_time" id="submissionTimeHidden">
                    
                    <div class="form-group">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-user"></i> Full Name *
                        </label>
                        <input type="text" class="form-control" id="fullName" name="fullName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email Address *
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">
                            <i class="fas fa-phone"></i> Phone Number *
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="address" class="form-label">
                            <i class="fas fa-home"></i> Street Address *
                        </label>
                        <input type="text" class="form-control" id="address" name="address" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="city" class="form-label">
                                    <i class="fas fa-city"></i> City *
                                </label>
                                <input type="text" class="form-control" id="city" name="city" required>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="postalCode" class="form-label">
                                    <i class="fas fa-mail-bulk"></i> Postal Code *
                                </label>
                                <input type="text" class="form-control" id="postalCode" name="postalCode" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="country" class="form-label">
                            <i class="fas fa-globe"></i> Country *
                        </label>
                        <select class="form-control" id="country" name="country" required>
                            <option value="">Select Country</option>
                            <option value="US">United States</option>
                            <option value="IN">India</option>
                            <option value="UK">United Kingdom</option>
                            <option value="CA">Canada</option>
                            <option value="AU">Australia</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose" class="form-label">
                            <i class="fas fa-tag"></i> Purpose/Type *
                        </label>
                        <select class="form-control" id="purpose" name="purpose" required>
                            <option value="">Select Purpose</option>
                            <option value="personal">Personal</option>
                            <option value="business">Business</option>
                            <option value="shipping">Shipping</option>
                            <option value="billing">Billing</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Generate OTP & Send Card
                    </button>
                </form>
                
                <div class="otp-section" id="otpSection">
                    <h5><i class="fas fa-shield-alt"></i> OTP Verification</h5>
                    <p class="text-muted">A 6-digit OTP has been sent to your email. Please enter it below:</p>
                    <input type="text" class="form-control otp-input" id="otpInput" maxlength="6" placeholder="000000">
                    <div class="mt-3">
                        <button class="btn btn-primary" id="verifyOtpBtn">
                            <i class="fas fa-check"></i> Verify OTP
                        </button>
                        <button class="btn btn-secondary ms-2" id="resendOtpBtn">
                            <i class="fas fa-redo"></i> Resend OTP
                        </button>
                    </div>
                </div>
                
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Processing...</p>
                </div>
                
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i> <strong>Success!</strong> Your address card has been sent to your email.
                </div>
                
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i> <strong>Error:</strong> <span id="errorText"></span>
                </div>
                
                <div class="preview-card" id="previewCard">
                    <h5><i class="fas fa-eye"></i> Card Preview</h5>
                    <div id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let generatedOTP = '';
        let formData = {};
        
        // Form submission
        document.getElementById('addressForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate form
            if (!validateForm()) {
                return;
            }
            
            // Collect form data
            formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                country: document.getElementById('country').value,
                purpose: document.getElementById('purpose').value
            };
            
            // Show loading
            document.getElementById('loadingSpinner').style.display = 'block';
            hideMessages();
            
            // Generate OTP
            generatedOTP = generateOTP();
            
            // Set hidden fields for FormSubmit
            document.getElementById('otpCodeHidden').value = generatedOTP;
            document.getElementById('cardPurposeHidden').value = formData.purpose;
            document.getElementById('submissionTimeHidden').value = new Date().toLocaleString();
            
            try {
                // Simulate sending OTP (in real implementation, this would be handled by FormSubmit)
                await simulateOTPSending(formData.email, generatedOTP);
                
                // Show OTP section
                document.getElementById('otpSection').style.display = 'block';
                document.getElementById('loadingSpinner').style.display = 'none';
                
                // Show preview
                showPreview(formData);
                
            } catch (error) {
                showError('Failed to generate OTP. Please try again.');
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        });
        
        // Verify OTP
        document.getElementById('verifyOtpBtn').addEventListener('click', async function() {
            const enteredOTP = document.getElementById('otpInput').value;
            
            if (enteredOTP === generatedOTP) {
                document.getElementById('loadingSpinner').style.display = 'block';
                
                try {
                    // Submit the form to FormSubmit.co
                    await submitFormToFormSubmit();
                    
                    document.getElementById('loadingSpinner').style.display = 'none';
                    showSuccess('Your address card has been submitted successfully! You will receive an email confirmation.');
                    document.getElementById('otpSection').style.display = 'none';
                    
                    // Reset form after successful submission
                    setTimeout(() => {
                        document.getElementById('addressForm').reset();
                        document.getElementById('previewCard').style.display = 'none';
                    }, 3000);
                    
                } catch (error) {
                    showError('Failed to submit form. Please try again.');
                    document.getElementById('loadingSpinner').style.display = 'none';
                }
            } else {
                showError('Invalid OTP. Please try again.');
            }
        });
        
        // Resend OTP
        document.getElementById('resendOtpBtn').addEventListener('click', async function() {
            generatedOTP = generateOTP();
            document.getElementById('otpCodeHidden').value = generatedOTP;
            
            try {
                await simulateOTPSending(formData.email, generatedOTP);
                showSuccess('OTP has been regenerated. Check the updated code below.');
            } catch (error) {
                showError('Failed to regenerate OTP. Please try again.');
            }
        });
        
        // Form validation
        function validateForm() {
            const requiredFields = ['fullName', 'email', 'phone', 'address', 'city', 'postalCode', 'country', 'purpose'];
            
            for (let field of requiredFields) {
                const element = document.getElementById(field);
                if (!element.value.trim()) {
                    element.focus();
                    showError(`Please fill in all required fields.`);
                    return false;
                }
            }
            
            // Email validation
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('email').focus();
                showError('Please enter a valid email address.');
                return false;
            }
            
            return true;
        }
        
        // Generate 6-digit OTP
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // Simulate OTP sending (for demo purposes)
        async function simulateOTPSending(email, otp) {
            // Simulate API call delay
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Show OTP for demo purposes
            alert(`DEMO: Your OTP is ${otp}\n\nIn production, this would be sent to ${email}\n\nFormSubmit.co will send the complete form data to anandjhare4@gmail.com`);
        }
        
        // Submit form to FormSubmit.co
        async function submitFormToFormSubmit() {
            // Create form data for FormSubmit
            const form = document.getElementById('addressForm');
            const formData = new FormData(form);
            
            // Add card HTML as a hidden field
            const cardHTML = generateCardHTML({
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                country: document.getElementById('country').value,
                purpose: document.getElementById('purpose').value
            });
            
            // Add card HTML to form data
            formData.append('card_html', cardHTML);
            
            // Submit to FormSubmit.co
            const response = await fetch("https://formsubmit.co/rajatjha.ss708090@gmail.com", {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) {
                throw new Error('Form submission failed');
            }
            
            return response;
        }
        
        // Generate card HTML
        function generateCardHTML(data) {
            return `
                <div style="font-family: Arial, sans-serif; max-width: 400px; margin: 0 auto; border: 2px solid #667eea; border-radius: 15px; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <h2 style="color: #667eea; margin: 0;">${data.fullName}</h2>
                        <p style="color: #666; margin: 5px 0;">${data.purpose.charAt(0).toUpperCase() + data.purpose.slice(1)} Card</p>
                    </div>
                    <div style="background: white; padding: 15px; border-radius: 10px;">
                        <p style="margin: 8px 0;"><strong> Email:</strong> ${data.email}</p>
                        <p style="margin: 8px 0;"><strong> Phone:</strong> ${data.phone}</p>
                        <p style="margin: 8px 0;"><strong> Address:</strong> ${data.address}</p>
                        <p style="margin: 8px 0;"><strong> City:</strong> ${data.city}, ${data.postalCode}</p>
                        <p style="margin: 8px 0;"><strong> Country:</strong> ${data.country}</p>
                    </div>
                    <div style="text-align: center; margin-top: 15px; color: #888; font-size: 12px;">
                        Generated on ${new Date().toLocaleDateString()}
                    </div>
                </div>
            `;
        }
        
        // Show preview
        function showPreview(data) {
            const previewContent = document.getElementById('previewContent');
            previewContent.innerHTML = generateCardHTML(data);
            document.getElementById('previewCard').style.display = 'block';
        }
        
        // Message functions
        function showSuccess(message = 'Your address card has been sent successfully!') {
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> <strong>Success!</strong> ${message}`;
            successDiv.style.display = 'block';
            hideError();
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorDiv.style.display = 'block';
            hideSuccess();
        }
        
        function hideMessages() {
            hideSuccess();
            hideError();
        }
        
        function hideSuccess() {
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        // OTP input formatting
        document.getElementById('otpInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
